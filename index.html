<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { -webkit-font-smoothing: antialiased; }
    body { font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .card-hover { transition: transform 0.15s ease, box-shadow 0.15s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.1); }
    details summary::-webkit-details-marker { display: none; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .spin { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-violet-50 via-purple-50 to-pink-50">

<!-- Header -->
<header class="sticky top-0 z-20 bg-white/80 backdrop-blur-md border-b border-violet-100 px-6 py-4 flex items-center gap-3 shadow-sm">
  <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center shadow-md">
    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
    </svg>
  </div>
  <div>
    <h1 class="text-lg font-bold text-gray-900 leading-none tracking-tight">Canvas Tracker</h1>
    <p class="text-xs text-gray-400 mt-0.5">mcacubs.instructure.com</p>
  </div>
  <div class="ml-auto flex items-center gap-3">
    <span id="status-text" class="text-xs text-violet-500 font-medium pulse">Loading...</span>
    <button onclick="refresh()" title="Refresh" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-violet-50 text-gray-400 hover:text-violet-600 transition-colors">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
    </button>
  </div>
</header>

<div class="flex" style="height: calc(100vh - 65px)">
  <!-- Sidebar -->
  <aside class="w-72 flex-shrink-0 bg-white/70 backdrop-blur-sm border-r border-violet-100 flex flex-col overflow-y-auto scrollbar-hide">
    <!-- Mini Calendar -->
    <div class="p-5">
      <div id="mini-calendar"></div>
    </div>
    <!-- Course Filter -->
    <div class="px-5 pb-6">
      <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Courses</h3>
      <div id="course-filter" class="flex flex-col gap-1.5"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-y-auto scrollbar-hide p-6" id="main-content">
    <div class="flex flex-col items-center justify-center h-full gap-4">
      <div class="w-10 h-10 border-4 border-violet-200 border-t-violet-500 rounded-full spin"></div>
      <p class="text-gray-400 text-sm">Loading your assignments...</p>
    </div>
  </main>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allAssignments = [];
let enabledCourses = new Set();
let selectedDate = null;
let currentMonth = new Date();
currentMonth.setDate(1);

// ─── Color palette ───────────────────────────────────────────────────────────
const PALETTES = [
  { bg:'bg-violet-100', text:'text-violet-700', dot:'bg-violet-500', border:'border-violet-200', hex:'#8b5cf6' },
  { bg:'bg-rose-100',   text:'text-rose-700',   dot:'bg-rose-500',   border:'border-rose-200',   hex:'#f43f5e' },
  { bg:'bg-sky-100',    text:'text-sky-700',    dot:'bg-sky-500',    border:'border-sky-200',    hex:'#0ea5e9' },
  { bg:'bg-emerald-100',text:'text-emerald-700',dot:'bg-emerald-500',border:'border-emerald-200',hex:'#10b981' },
  { bg:'bg-amber-100',  text:'text-amber-700',  dot:'bg-amber-500',  border:'border-amber-200',  hex:'#f59e0b' },
  { bg:'bg-pink-100',   text:'text-pink-700',   dot:'bg-pink-500',   border:'border-pink-200',   hex:'#ec4899' },
  { bg:'bg-teal-100',   text:'text-teal-700',   dot:'bg-teal-500',   border:'border-teal-200',   hex:'#14b8a6' },
  { bg:'bg-orange-100', text:'text-orange-700', dot:'bg-orange-500', border:'border-orange-200', hex:'#f97316' },
];
let courseList = [];
function palette(course) {
  const i = courseList.indexOf(course);
  return PALETTES[Math.max(0, i) % PALETTES.length];
}

// ─── Data ─────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const r = await fetch('/api/calendar');
    const data = await r.json();
    if (!Array.isArray(data)) throw new Error(data.error || 'Bad response');
    allAssignments = data;
    courseList = [...new Set(data.map(a => a.course))].sort();
    enabledCourses = new Set(courseList);
    document.getElementById('status-text').textContent = `${data.length} events`;
    document.getElementById('status-text').classList.remove('pulse', 'text-violet-500');
    document.getElementById('status-text').classList.add('text-gray-400');
    render();
  } catch(e) {
    document.getElementById('status-text').textContent = 'Error loading';
    document.getElementById('status-text').classList.remove('pulse','text-violet-500');
    document.getElementById('status-text').classList.add('text-rose-500');
    document.getElementById('main-content').innerHTML = `
      <div class="bg-rose-50 border border-rose-200 text-rose-600 rounded-2xl p-5 text-sm max-w-md mx-auto mt-10">
        <p class="font-semibold mb-1">Failed to load calendar</p>
        <p class="text-rose-400">${e.message}</p>
      </div>`;
  }
}

function refresh() {
  document.getElementById('status-text').textContent = 'Refreshing...';
  document.getElementById('status-text').classList.add('pulse','text-violet-500');
  document.getElementById('status-text').classList.remove('text-gray-400','text-rose-500');
  loadData();
}

// ─── Filters ──────────────────────────────────────────────────────────────────
function filtered() {
  return allAssignments.filter(a => {
    if (!enabledCourses.has(a.course)) return false;
    if (selectedDate) {
      const d = new Date(a.dueDate);
      return d.toDateString() === selectedDate.toDateString();
    }
    return true;
  });
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  renderCalendar();
  renderCourseFilter();
  renderAssignments();
}

// ─── Mini Calendar ────────────────────────────────────────────────────────────
function renderCalendar() {
  const year = currentMonth.getFullYear();
  const month = currentMonth.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const today = new Date();
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS = ['Su','Mo','Tu','We','Th','Fr','Sa'];

  // build date→colors map
  const dateColors = {};
  for (const a of allAssignments) {
    if (!enabledCourses.has(a.course)) continue;
    const d = new Date(a.dueDate);
    if (d.getFullYear() === year && d.getMonth() === month) {
      const key = d.getDate();
      if (!dateColors[key]) dateColors[key] = [];
      const hex = palette(a.course).hex;
      if (!dateColors[key].includes(hex)) dateColors[key].push(hex);
    }
  }

  let html = `
    <div class="flex items-center justify-between mb-4">
      <button onclick="changeMonth(-1)" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-violet-50 text-gray-400 hover:text-violet-600 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </button>
      <span class="text-sm font-semibold text-gray-700">${MONTHS[month]} ${year}</span>
      <button onclick="changeMonth(1)" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-violet-50 text-gray-400 hover:text-violet-600 transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
      </button>
    </div>
    <div class="grid grid-cols-7 mb-1">
      ${DAYS.map(d=>`<div class="text-center text-xs font-medium text-gray-400 py-1">${d}</div>`).join('')}
    </div>
    <div class="grid grid-cols-7 gap-y-0.5">
  `;

  // empty cells
  for (let i = 0; i < firstDay; i++) html += '<div></div>';

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const isToday = date.toDateString() === today.toDateString();
    const isSel = selectedDate && date.toDateString() === selectedDate.toDateString();
    const dots = dateColors[day] || [];

    let cls = 'relative flex flex-col items-center justify-center w-full py-1 rounded-xl text-sm font-medium transition-all cursor-pointer select-none ';
    if (isSel) cls += 'bg-violet-600 text-white shadow-md ';
    else if (isToday) cls += 'bg-violet-100 text-violet-700 font-bold ';
    else cls += 'text-gray-600 hover:bg-violet-50 ';

    const dotHtml = dots.length
      ? `<div class="flex gap-0.5 mt-0.5">${dots.slice(0,3).map(c=>`<div style="width:6px;height:6px;border-radius:50%;background:${isSel?'rgba(255,255,255,0.7)':c}"></div>`).join('')}</div>`
      : '';

    html += `<button class="${cls}" onclick="selectDate(${year},${month},${day})">
      <span>${day}</span>${dotHtml}
    </button>`;
  }

  html += '</div>';
  document.getElementById('mini-calendar').innerHTML = html;
}

function changeMonth(dir) {
  currentMonth.setMonth(currentMonth.getMonth() + dir);
  renderCalendar();
}

function selectDate(y, m, d) {
  const date = new Date(y, m, d);
  if (selectedDate && selectedDate.toDateString() === date.toDateString()) {
    selectedDate = null;
  } else {
    selectedDate = date;
    // navigate month if needed
    currentMonth = new Date(y, m, 1);
  }
  render();
}

// ─── Course Filter ────────────────────────────────────────────────────────────
function renderCourseFilter() {
  if (!courseList.length) {
    document.getElementById('course-filter').innerHTML = '';
    return;
  }
  document.getElementById('course-filter').innerHTML = courseList.map(course => {
    const p = palette(course);
    const count = allAssignments.filter(a => a.course === course).length;
    const on = enabledCourses.has(course);
    return `<button onclick="toggleCourse('${CSS.escape(course)}')"
      class="flex items-center gap-2.5 px-3 py-2 rounded-xl text-left transition-all text-sm w-full ${on ? p.bg+' '+p.text : 'text-gray-400 hover:bg-gray-50'}">
      <span class="w-2.5 h-2.5 rounded-full flex-shrink-0 ${on ? p.dot : 'bg-gray-300'}"></span>
      <span class="flex-1 font-medium truncate">${escHtml(course || 'Other')}</span>
      <span class="text-xs px-1.5 py-0.5 rounded-full font-medium ${on ? 'bg-white/60' : 'bg-gray-100'}">${count}</span>
    </button>`;
  }).join('');
}

function toggleCourse(course) {
  // Find actual course name (CSS.escape might not be reversible for all chars)
  const actual = courseList.find(c => CSS.escape(c) === course) ?? course;
  if (enabledCourses.has(actual)) enabledCourses.delete(actual);
  else enabledCourses.add(actual);
  render();
}

// ─── Assignments ──────────────────────────────────────────────────────────────
function renderAssignments() {
  const now = new Date();
  const items = filtered();
  const upcoming = items.filter(a => new Date(a.dueDate) >= now);
  const past = items.filter(a => new Date(a.dueDate) < now);

  let html = '<div class="fade-in">';

  if (selectedDate) {
    const label = selectedDate.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
    html += `<div class="mb-5 flex items-center gap-2">
      <h2 class="text-lg font-semibold text-gray-800">${label}</h2>
      <button onclick="clearDate()" class="text-xs text-violet-500 hover:text-violet-700 bg-violet-50 hover:bg-violet-100 px-2.5 py-1 rounded-full transition-colors">Clear</button>
    </div>`;
  }

  if (!items.length) {
    html += `<div class="flex flex-col items-center justify-center h-64 gap-3">
      <div class="w-16 h-16 bg-violet-100 rounded-2xl flex items-center justify-center">
        <svg class="w-8 h-8 text-violet-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25zM6.75 12h.008v.008H6.75V12zm0 3h.008v.008H6.75V15zm0 3h.008v.008H6.75V18z" />
        </svg>
      </div>
      <p class="text-gray-400 text-sm font-medium">No assignments here!</p>
    </div>`;
  } else {
    html += renderGrouped(upcoming, false);

    if (!selectedDate && past.length) {
      html += `<details class="mt-2">
        <summary class="cursor-pointer text-sm text-gray-400 hover:text-gray-600 font-medium mb-4 flex items-center gap-2 select-none">
          <svg class="w-4 h-4 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
          </svg>
          Past assignments (${past.length})
        </summary>
        <div class="mt-4 opacity-60">${renderGrouped(past.slice().reverse(), true)}</div>
      </details>`;
    }
  }

  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

function renderGrouped(items, reverse) {
  const groups = {};
  for (const a of items) {
    const d = new Date(a.dueDate);
    const key = d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
    if (!groups[key]) groups[key] = [];
    groups[key].push(a);
  }
  const keys = reverse ? Object.keys(groups).reverse() : Object.keys(groups);
  return keys.map(label => `
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-3">
        <h2 class="text-sm font-semibold text-gray-500 whitespace-nowrap">${label}</h2>
        <div class="flex-1 h-px bg-gray-100"></div>
        <span class="text-xs text-gray-400 font-medium">${groups[label].length}</span>
      </div>
      <div class="flex flex-col gap-3">
        ${groups[label].map(a => renderCard(a)).join('')}
      </div>
    </div>
  `).join('');
}

function renderCard(a) {
  const p = palette(a.course);
  const { label, urgent } = formatDue(a.dueDate);
  const href = a.url ? `href="${escHtml(a.url)}" target="_blank" rel="noopener"` : '';
  return `<a ${href} class="block group bg-white rounded-2xl p-4 shadow-sm border ${p.border} card-hover" style="text-decoration:none">
    <div class="flex items-start gap-3">
      <div class="w-1 self-stretch rounded-full ${p.dot} flex-shrink-0 mt-0.5"></div>
      <div class="flex-1 min-w-0">
        <div class="flex items-start justify-between gap-2">
          <h3 class="font-semibold text-gray-800 text-sm leading-snug group-hover:text-violet-700 transition-colors">${escHtml(a.title)}</h3>
          ${urgent ? '<span class="flex-shrink-0 text-xs font-semibold text-rose-600 bg-rose-50 border border-rose-100 px-2 py-0.5 rounded-full">Soon</span>' : ''}
        </div>
        ${a.course ? `<span class="inline-block text-xs font-medium px-2 py-0.5 rounded-full mt-1.5 ${p.bg} ${p.text}">${escHtml(a.course)}</span>` : ''}
        <div class="flex items-center gap-1.5 mt-2">
          <svg class="w-3.5 h-3.5 flex-shrink-0 ${urgent?'text-rose-400':'text-gray-400'}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="text-xs font-medium ${urgent?'text-rose-500':'text-gray-400'}">${label}</span>
        </div>
        ${a.description ? `<p class="text-xs text-gray-400 mt-2 line-clamp-2 leading-relaxed">${escHtml(a.description)}</p>` : ''}
      </div>
    </div>
  </a>`;
}

function formatDue(iso) {
  const due = new Date(iso);
  const now = new Date();
  const diff = due.getTime() - now.getTime();
  const days = Math.ceil(diff / 86400000);
  const time = due.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  const date = due.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  if (days === 0) return { label: `Today at ${time}`, urgent: true };
  if (days === 1) return { label: `Tomorrow at ${time}`, urgent: true };
  if (days < 0)  return { label: `${date} at ${time}`, urgent: false };
  return { label: `${date} at ${time}`, urgent: days <= 3 };
}

function clearDate() {
  selectedDate = null;
  render();
}

function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
